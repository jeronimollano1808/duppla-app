<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>DUPPLA</title>
<style>
/* ============================================================
   1. RESET Y BASE
   Eliminamos márgenes y paddings por defecto del navegador
   y establecemos box-sizing para que el tamaño de elementos
   incluya padding y border en su cálculo
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ============================================================
   2. VARIABLES DE COLOR — PALETA LIGHT MODE
   Definimos todos los colores en un solo lugar para
   facilitar cambios globales. Si quieres cambiar un color,
   solo modifica aquí y aplica en toda la app.
   - --lime: verde lima de DUPPLA (#C8E05A)
   - --lime-dark: versión más oscura para hover
   - --ink: texto principal casi negro
   - --ink-2: texto secundario gris medio
   - --ink-3: texto terciario gris claro
   - --surface: fondo blanco puro
   - --surface-2: fondo gris muy claro para tarjetas
   - --surface-3: fondo gris para inputs y hover
   - --border: color de bordes sutiles
   - --red, --blue, --amber: colores semánticos
   ============================================================ */
:root{
  --lime:#5A8A1F;
  --lime-bg:#EEF5DC;
  --lime-accent:#C8E05A;
  --ink:#111827;
  --ink-2:#6B7280;
  --ink-3:#9CA3AF;
  --surface:#FFFFFF;
  --surface-2:#F9FAFB;
  --surface-3:#F3F4F6;
  --border:#E5E7EB;
  --border-2:#D1D5DB;
  --red:#DC2626;
  --red-bg:#FEF2F2;
  --blue:#2563EB;
  --blue-bg:#EFF6FF;
  --amber:#D97706;
  --amber-bg:#FFFBEB;
  --green:#16A34A;
  --green-bg:#F0FDF4;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -1px rgba(0,0,0,.04);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -2px rgba(0,0,0,.04);
  --radius:10px;
  --radius-lg:14px;
  --radius-xl:20px;
}

/* ============================================================
   3. TIPOGRAFÍA BASE
   Usamos la fuente del sistema para máxima compatibilidad
   y mejor rendimiento en todos los dispositivos
   ============================================================ */
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;
  background:var(--surface-2);
  color:var(--ink);
  min-height:100vh;
  font-size:14px;
  line-height:1.5;
}

/* ============================================================
   4. PANTALLAS ESPECIALES
   Loading: pantalla de carga inicial
   Login: formulario de acceso
   ============================================================ */
#loading{
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  flex-direction:column;
  gap:12px;
  background:var(--surface);
}
.loading-logo{font-size:24px;font-weight:800;color:var(--lime);letter-spacing:1px}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(--lime-accent);display:inline-block;animation:bounce 1.2s infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

/* ============================================================
   5. LOGIN SCREEN
   Pantalla de acceso con diseño limpio tipo Notion
   ============================================================ */
#login-screen{
  display:none;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  background:var(--surface-2);
  padding:24px;
}
.login-card{
  width:100%;
  max-width:380px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:36px 32px;
  box-shadow:var(--shadow-lg);
}
.login-logo{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}
.login-logo-mark{
  width:36px;height:36px;
  background:var(--lime-accent);
  border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:16px;color:var(--ink);
}
.login-logo-text{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:.5px}
.login-subtitle{font-size:13px;color:var(--ink-2);margin-bottom:28px}
.login-label{font-size:12px;font-weight:500;color:var(--ink-2);display:block;margin-bottom:5px}
.login-input{
  width:100%;padding:10px 13px;
  background:var(--surface-2);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--ink);font-size:14px;
  outline:none;transition:border-color .15s;
  -webkit-appearance:none;
}
.login-input:focus{border-color:var(--lime-accent);background:var(--surface)}
.login-group{margin-bottom:14px}
.login-btn{
  width:100%;padding:11px;margin-top:6px;
  background:var(--ink);border:none;
  border-radius:var(--radius);color:#fff;
  font-weight:600;font-size:14px;cursor:pointer;
  transition:opacity .15s;
}
.login-btn:hover{opacity:.85}
.login-err{
  background:var(--red-bg);border:1px solid #FECACA;
  border-radius:8px;padding:9px 13px;
  font-size:13px;color:var(--red);
  margin-bottom:14px;display:none;
}

/* ============================================================
   6. LAYOUT PRINCIPAL
   Sidebar fijo a la izquierda + contenido principal
   En móvil el sidebar se oculta y aparece con el hamburger
   ============================================================ */
#app{display:none}
.layout{display:flex;min-height:100vh}

/* ============================================================
   7. SIDEBAR
   Menú lateral con logo, navegación y footer de usuario
   ============================================================ */
.sidebar{
  width:240px;
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;
  z-index:100;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.sidebar-header{
  padding:20px 16px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.sidebar-logo-mark{
  width:32px;height:32px;
  background:var(--lime-accent);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:14px;color:var(--ink);flex-shrink:0;
}
.sidebar-logo-text{font-size:16px;font-weight:800;color:var(--ink);letter-spacing:.3px}
.sidebar-logo-sub{font-size:10px;color:var(--ink-3);margin-top:1px}

/* ============================================================
   8. NAVEGACIÓN DEL SIDEBAR
   Botones de menú con estado activo e ícono + texto
   ============================================================ */
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-section-title{
  font-size:10px;font-weight:600;color:var(--ink-3);
  text-transform:uppercase;letter-spacing:.08em;
  padding:6px 10px 4px;
}
.nav-btn{
  width:100%;display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:8px;border:none;
  background:transparent;color:var(--ink-2);
  cursor:pointer;font-size:13px;font-weight:500;
  margin-bottom:1px;text-align:left;
  transition:all .12s;
}
.nav-btn:hover{background:var(--surface-3);color:var(--ink)}
.nav-btn.active{background:var(--lime-bg);color:var(--lime)}
.nav-btn .ico{
  width:28px;height:28px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;
  background:var(--surface-3);
  transition:background .12s;
}
.nav-btn.active .ico{background:var(--lime-accent);}
.nav-btn:hover:not(.active) .ico{background:var(--border)}

/* ============================================================
   9. FOOTER DEL SIDEBAR
   Muestra el email del usuario y el botón de logout
   ============================================================ */
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border)}
.sidebar-user{
  display:flex;align-items:center;gap:9px;margin-bottom:10px;
}
.sidebar-avatar{
  width:30px;height:30px;border-radius:50%;
  background:var(--lime-accent);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--ink);flex-shrink:0;
}
.sidebar-email{font-size:11px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.btn-logout{
  width:100%;padding:7px;background:transparent;
  border:1px solid var(--border);border-radius:8px;
  color:var(--ink-2);cursor:pointer;font-size:12px;
  transition:all .12s;
}
.btn-logout:hover{background:var(--red-bg);color:var(--red);border-color:#FECACA}

/* ============================================================
   10. HEADER MÓVIL
   Barra superior visible solo en pantallas pequeñas
   ============================================================ */
.mobile-header{
  display:none;
  position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  align-items:center;justify-content:space-between;
  padding:0 14px;z-index:200;
  box-shadow:var(--shadow-sm);
}
.mobile-logo{display:flex;align-items:center;gap:8px}
.mobile-logo-mark{width:26px;height:26px;background:var(--lime-accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:var(--ink)}
.mobile-logo-text{font-size:15px;font-weight:800;color:var(--ink)}
.hamburger{background:none;border:none;color:var(--ink-2);font-size:20px;cursor:pointer;padding:4px;border-radius:6px}
.hamburger:hover{background:var(--surface-3)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99;backdrop-filter:blur(2px)}

/* ============================================================
   11. CONTENIDO PRINCIPAL
   Área de contenido con margen para el sidebar en desktop
   ============================================================ */
.main{margin-left:240px;padding:28px;min-height:100vh}
.page{display:none}
.page.active{display:block}

/* ============================================================
   12. ENCABEZADOS DE PÁGINA
   Título + subtítulo + acción alineados
   ============================================================ */
.page-header{
  display:flex;align-items:flex-start;
  justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:12px;
}
.page-title{font-size:20px;font-weight:700;color:var(--ink)}
.page-sub{font-size:13px;color:var(--ink-3);margin-top:2px}

/* ============================================================
   13. TARJETAS (CARDS)
   Contenedor con fondo blanco, borde y sombra sutil
   ============================================================ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:20px;
  margin-bottom:16px;
  box-shadow:var(--shadow-sm);
}
.card-title{font-size:13px;font-weight:600;color:var(--ink-2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em}

/* ============================================================
   14. MÉTRICAS / KPI CARDS
   Tarjetas de números grandes para el dashboard
   ============================================================ */
.metrics-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;margin-bottom:20px;
}
.metric-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px 18px;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .15s;
}
.metric-card:hover{box-shadow:var(--shadow)}
.metric-label{font-size:11px;font-weight:600;color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.metric-value{font-size:24px;font-weight:700;color:var(--ink);line-height:1}
.metric-sub{font-size:11px;color:var(--ink-3);margin-top:4px}
.metric-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;font-weight:500;padding:2px 7px;
  border-radius:20px;margin-top:6px;
}
.badge-up{background:var(--green-bg);color:var(--green)}
.badge-down{background:var(--red-bg);color:var(--red)}

/* ============================================================
   15. TABLAS
   Diseño limpio con hover en filas y separadores sutiles
   ============================================================ */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl thead tr{border-bottom:1.5px solid var(--border)}
.tbl th{
  text-align:left;padding:10px 12px;
  font-size:11px;font-weight:600;
  color:var(--ink-3);text-transform:uppercase;
  letter-spacing:.05em;white-space:nowrap;
}
.tbl tbody tr{
  border-bottom:1px solid var(--border);
  transition:background .1s;
}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:hover{background:var(--surface-2)}
.tbl td{
  padding:11px 12px;color:var(--ink);
  max-width:180px;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;
}

/* ============================================================
   16. BADGES Y ETIQUETAS
   Chips de color para canales, categorías, estados
   ============================================================ */
.badge{
  display:inline-block;padding:3px 9px;
  border-radius:20px;font-size:11px;font-weight:600;
  white-space:nowrap;
}
.b-web{background:#DBEAFE;color:#1D4ED8}
.b-directo{background:var(--lime-bg);color:var(--lime)}
.b-distribuidor{background:#FEF3C7;color:#92400E}
.b-danger{background:var(--red-bg);color:var(--red)}
.b-warning{background:var(--amber-bg);color:var(--amber)}
.b-success{background:var(--green-bg);color:var(--green)}
.b-info{background:#EFF6FF;color:var(--blue)}
.b-gray{background:var(--surface-3);color:var(--ink-2)}

/* ============================================================
   17. BOTONES
   Sistema de botones con variantes primary, secondary, danger
   ============================================================ */
.btn{
  padding:8px 14px;border-radius:var(--radius);
  border:1px solid var(--border-2);
  background:var(--surface);color:var(--ink);
  cursor:pointer;font-size:13px;font-weight:500;
  display:inline-flex;align-items:center;gap:5px;
  font-family:inherit;transition:all .12s;
  white-space:nowrap;
}
.btn:hover{background:var(--surface-3)}
.btn-primary{
  background:var(--ink);color:#fff;
  border-color:var(--ink);
}
.btn-primary:hover{opacity:.85}
.btn-lime{
  background:var(--lime-accent);color:var(--ink);
  border-color:var(--lime-accent);font-weight:600;
}
.btn-lime:hover{opacity:.85}
.btn-danger{color:var(--red);border-color:#FECACA;background:var(--surface)}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:8px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:6px}

/* ============================================================
   18. FORMULARIOS
   Inputs, selects y labels con estilo consistente
   ============================================================ */
.f-group{margin-bottom:14px}
.f-label{font-size:12px;font-weight:500;color:var(--ink-2);display:block;margin-bottom:5px}
.f-input{
  width:100%;padding:9px 12px;
  background:var(--surface-2);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  color:var(--ink);font-size:14px;font-family:inherit;
  outline:none;transition:all .15s;-webkit-appearance:none;
}
.f-input:focus{border-color:var(--lime-accent);background:var(--surface);box-shadow:0 0 0 3px rgba(200,224,90,.15)}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:0}
.f-row.trio{grid-template-columns:1fr 1fr 1fr}

/* ============================================================
   19. MODALES
   Overlay + panel centrado con animación de entrada
   ============================================================ */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.35);z-index:500;
  align-items:center;justify-content:center;
  padding:16px;backdrop-filter:blur(3px);
}
.modal-bg.open{display:flex}
.modal{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:24px;width:100%;max-width:480px;
  max-height:90vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-header{
  display:flex;justify-content:space-between;
  align-items:center;margin-bottom:20px;
}
.modal-title{font-size:16px;font-weight:700;color:var(--ink)}
.modal-close{
  background:var(--surface-3);border:none;
  color:var(--ink-2);font-size:16px;cursor:pointer;
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
}
.modal-close:hover{background:var(--border);color:var(--ink)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ============================================================
   20. ALERTAS Y BANNERS
   Banners de advertencia, éxito, error para stock bajo, etc.
   ============================================================ */
.alert{
  display:flex;align-items:flex-start;gap:10px;
  padding:12px 14px;border-radius:var(--radius);
  margin-bottom:16px;font-size:13px;
}
.alert-warn{background:var(--amber-bg);border:1px solid #FDE68A;color:#78350F}
.alert-error{background:var(--red-bg);border:1px solid #FECACA;color:#7F1D1D}
.alert-success{background:var(--green-bg);border:1px solid #BBF7D0;color:#14532D}
.alert-icon{font-size:15px;flex-shrink:0;margin-top:1px}

/* ============================================================
   21. BARRAS DE PROGRESO
   Para métricas de metas y stock
   ============================================================ */
.prog{height:6px;background:var(--surface-3);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s ease}
.prog-lime{background:var(--lime-accent)}
.prog-blue{background:var(--blue)}
.prog-red{background:var(--red)}
.prog-amber{background:var(--amber)}

/* ============================================================
   22. ESTADO VACÍO
   Mensaje cuando no hay datos en una sección
   ============================================================ */
.empty-state{
  text-align:center;padding:40px 20px;
  color:var(--ink-3);
}
.empty-state-icon{font-size:32px;margin-bottom:8px}
.empty-state-text{font-size:14px;font-weight:500;color:var(--ink-2);margin-bottom:4px}
.empty-state-sub{font-size:13px;color:var(--ink-3)}

/* ============================================================
   23. CHIPS DE ESTADO (para pedidos)
   ============================================================ */
.status-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
}
.status-chip::before{content:'';width:5px;height:5px;border-radius:50%}
.chip-pending{background:#FEF3C7;color:#92400E}.chip-pending::before{background:#F59E0B}
.chip-transit{background:var(--blue-bg);color:#1E40AF}.chip-transit::before{background:var(--blue)}
.chip-received{background:var(--green-bg);color:#166534}.chip-received::before{background:var(--green)}
.chip-cancelled{background:var(--red-bg);color:#991B1B}.chip-cancelled::before{background:var(--red)}

/* ============================================================
   24. NOTIFICACIONES — CAMPANA Y PANEL
   ============================================================ */
.notif-wrap{position:relative}
.notif-btn{
  position:relative;background:var(--surface-2);
  border:1px solid var(--border);border-radius:var(--radius);
  padding:7px 10px;color:var(--ink-2);cursor:pointer;
  font-size:15px;display:flex;align-items:center;
  transition:all .12s;
}
.notif-btn:hover{background:var(--surface-3)}
.notif-dot{
  position:absolute;top:-4px;right:-4px;
  background:var(--red);color:#fff;
  border-radius:50%;min-width:17px;height:17px;
  font-size:10px;font-weight:700;
  display:none;align-items:center;justify-content:center;
  border:2px solid var(--surface);
}
.notif-panel{
  position:absolute;top:calc(100% + 8px);right:0;
  width:300px;background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  display:none;z-index:400;overflow:hidden;
}
.notif-panel.open{display:block}
.notif-panel-header{
  padding:12px 16px;border-bottom:1px solid var(--border);
  font-size:13px;font-weight:600;color:var(--ink);
  display:flex;justify-content:space-between;align-items:center;
}
.notif-item{padding:11px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:var(--surface-2)}
.notif-item.unread{background:var(--lime-bg)}
.notif-item-title{font-size:12px;font-weight:600;color:var(--ink);margin-bottom:2px}
.notif-item-body{font-size:11px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.notif-item-time{font-size:10px;color:var(--ink-3);margin-top:2px}
.notif-empty{padding:24px;text-align:center;font-size:13px;color:var(--ink-3)}

/* ============================================================
   25. GRÁFICO DE BARRAS SIMPLE (para dashboard)
   ============================================================ */
.bar-chart{display:flex;align-items:flex-end;gap:10px;height:90px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-rect{width:100%;border-radius:5px 5px 0 0;min-height:3px;transition:height .4s ease}
.bar-lbl{font-size:10px;color:var(--ink-3);text-align:center;white-space:nowrap}
.bar-val{font-size:10px;font-weight:600;color:var(--ink-2)}

/* ============================================================
   26. CARDS DE PROVEEDOR Y PEDIDO
   Layout especial para secciones con tarjetas tipo lista
   ============================================================ */
.list-cards{display:grid;gap:12px}

// ============================================================
// 41. HELPERS — FUNCIONES DE UTILIDAD
// fmt: formatea números como moneda colombiana ($1.234.567)
// today: retorna la fecha de hoy en formato YYYY-MM-DD
// ============================================================
// 98. fmt formatea números como pesos colombianos con separador de miles
//     Ejemplos: 110000 → $110.000 | 1500000 → $1.500.000
//     toLocaleString('es-CO') usa el formato colombiano: punto para miles, coma para decimales
const fmt = n => '$' + Number(n||0).toLocaleString('es-CO');

// 99. fmtCOP igual que fmt pero agrega la etiqueta COP al final
//     Se usa en los botones de tipo de precio para máxima claridad
const fmtCOP = n => n > 0 ? '$' + Number(n).toLocaleString('es-CO') + ' COP' : 'N/D';
const today = () => new Date().toISOString().slice(0,10);

  { id:'inventario', label:'Inventario', ico:'📦', group:'Negocio' },

  { id:'gastos', label:'Gastos', ico:'💸', group:'Negocio' },

// ============================================================
// 43. AUTENTICACIÓN — DETECTOR DE ESTADO DE LOGIN
// onAuthStateChanged escucha cambios de sesión automáticamente
// Se ejecuta al abrir la app y cuando el usuario hace login/logout
// ============================================================
onAuthStateChanged(auth, user => {
  document.getElementById('loading').style.display = 'none';
  if (user) {
    // 44. Usuario logueado: mostramos la app y configuramos UI
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-email-display').textContent = user.email;
    // Mostramos inicial del email en el avatar
    const initial = user.email.charAt(0).toUpperCase();
    document.getElementById('user-avatar').textContent = initial;
    startListeners();   // Iniciamos conexión con Firebase
    buildNav();         // Construimos el menú lateral
    showPage('dashboard');
    requestNotifPermission(); // Pedimos permiso de notificaciones
  } else {
    // 45. Sin usuario: mostramos pantalla de login
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

// ============================================================
// 46. LOGIN Y LOGOUT
// doLogin envía credenciales a Firebase para autenticar
// doLogout cierra la sesión actual
// ============================================================
window.doLogin = async () => {
  const email = document.getElementById('li-email').value;
  const pass = document.getElementById('li-pass').value;
  const errEl = document.getElementById('login-err');
  const btn = document.querySelector('.login-btn');
  errEl.style.display = 'none';
  btn.textContent = 'Ingresando...';
  btn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    document.getElementById('login-screen').style.display = 'none';
  } catch(e) {
    errEl.style.display = 'block';
    btn.textContent = 'Ingresar →';
    btn.disabled = false;
  }
};
window.doLogout = () => signOut(auth);

// Enter en password dispara el login
document.getElementById('li-pass')?.addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});

// ============================================================
// 47. OYENTES DE FIRESTORE EN TIEMPO REAL
// onSnapshot mantiene los datos sincronizados automáticamente
// Cada cambio en Firebase actualiza DATA y redibuja la página
// ============================================================
function startListeners() {
  const cols = ['ventas','inventario','gastos','proveedores','pedidos','metas'];
  cols.forEach(col => {
    const q = query(collection(db, col), orderBy('createdAt','desc'));
    onSnapshot(q, snap => {
      DATA[col] = snap.docs.map(d => ({id:d.id, ...d.data()}));
      // Solo redibujamos si estamos en la página relevante o el dashboard
      if(currentPage === col || currentPage === 'dashboard') renderPage(currentPage);
      if(currentPage === 'clientes' && col === 'ventas') renderPage('clientes');
      if(col === 'inventario') checkStockAlerts();
    });
  });
  // Oyente especial para notificaciones (últimas 30)
  const nq = query(collection(db,'notificaciones'), orderBy('createdAt','desc'), limit(30));
  let firstLoad = true;
  onSnapshot(nq, snap => {
    const prevIds = DATA.notificaciones.map(n=>n.id);
    DATA.notificaciones = snap.docs.map(d=>({id:d.id,...d.data()}));
    // Mostramos notificación del browser solo para items nuevos (no en carga inicial)
    if(!firstLoad) {
      snap.docChanges().forEach(change => {
        if(change.type === 'added' && !prevIds.includes(change.doc.id)) {
          const d = change.doc.data();
          showBrowserNotif(d.titulo, d.cuerpo);
        }
      });
    }
    firstLoad = false;
    renderNotifBell();
  });
}

// ============================================================
// 48. NAVEGACIÓN ENTRE PÁGINAS
// showPage activa la página seleccionada y desactiva las demás
// buildNav construye el menú lateral con grupos
// ============================================================
function buildNav() {
  const nav = document.getElementById('nav-menu');
  let html = '';
  let lastGroup = '';
  MENU.forEach(m => {
    // Agregamos título de grupo cuando cambia
    if(m.group !== lastGroup) {
      html += `<div class="nav-section-title">${m.group}</div>`;
      lastGroup = m.group;
    }
    html += `<button class="nav-btn${m.id===currentPage?' active':''}" onclick="showPage('${m.id}')">
      <span class="ico">${m.ico}</span>${m.label}
    </button>`;
  });
  nav.innerHTML = html;
}

window.showPage = (id) => {
  currentPage = id;
  // Desactivamos todas las páginas y activamos la seleccionada
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+id)?.classList.add('active');
  buildNav(); // Reconstruimos el nav para actualizar el estado activo
  renderPage(id);
  closeSidebar(); // En móvil cerramos el sidebar al navegar
};

function renderPage(id) {
  const renders = {
    dashboard:renderDashboard, ventas:renderVentas,
    inventario:renderInventario, clientes:renderClientes,
    gastos:renderGastos, proveedores:renderProveedores,
    pedidos:renderPedidos, metas:renderMetas
  };
  if(renders[id]) renders[id]();
}

// ============================================================
// 51. NOTIFICACIONES DEL NAVEGADOR
// requestPermission pide permiso al usuario para mostrar notifs
// showBrowserNotif muestra una notificación nativa del OS
// pushNotif guarda la notificación en Firebase para el otro socio
// ============================================================
function requestNotifPermission() {
  if('Notification' in window && Notification.permission === 'default') {
    setTimeout(() => Notification.requestPermission(), 4000);
  }
}
function showBrowserNotif(title, body) {
  if('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, tag:'duppla', icon:'/favicon.ico' });
  }
}
async function pushNotif(titulo, cuerpo, tipo) {
  try {
    await addDoc(collection(db,'notificaciones'), {
      titulo, cuerpo, tipo, leida:false, createdAt:serverTimestamp()
    });
  } catch(e) {}
}

// ============================================================
// 52. RENDER DE LA CAMPANA DE NOTIFICACIONES
// Actualiza el contador y la lista de notificaciones
// ============================================================
function renderNotifBell() {
  const unread = DATA.notificaciones.filter(n=>!n.leida).length;
  // Actualizamos todos los contadores
  ['notif-count-s','notif-count-m'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    el.textContent = unread > 9 ? '9+' : unread;
    el.style.display = unread > 0 ? 'flex' : 'none';
  });
  // Generamos el HTML de la lista
  const listHtml = DATA.notificaciones.slice(0,15).map(n => {
    const t = n.createdAt?.seconds
      ? (() => { const diff = Math.floor((Date.now()-n.createdAt.seconds*1000)/60000); return diff<1?'ahora':diff<60?`${diff}m`:diff<1440?`${Math.floor(diff/60)}h`:`${Math.floor(diff/1440)}d`; })()
      : '';
    return `<div class="notif-item${n.leida?'':' unread'}">
      <div class="notif-item-title">${n.titulo||''}</div>
      <div class="notif-item-body">${n.cuerpo||''}</div>
      <div class="notif-item-time">${t}</div>
    </div>`;
  }).join('') || '<div class="notif-empty">Sin notificaciones aún</div>';
  document.getElementById('notif-list-m').innerHTML = listHtml;
}

window.toggleNotif = (ctx) => {
  if(ctx==='mobile') {
    document.getElementById('notif-panel-m')?.classList.toggle('open');
    markNotifsRead();
  }
};
window.markNotifsRead = async () => {
  DATA.notificaciones.filter(n=>!n.leida).forEach(n =>
    updateDoc(doc(db,'notificaciones',n.id),{leida:true}).catch(()=>{})
  );
};

// 53. ALERTA DE STOCK BAJO
// Verifica inventario y envía notificación si hay productos
// por debajo del mínimo. Solo una vez por día por producto
// ============================================================
function checkStockAlerts() {
  const low = DATA.inventario.filter(p => p.stock <= (p.stockMinimo||5));
  if(low.length > 0) {
    const key = 'duppla_stock_alert_' + today();
    if(!localStorage.getItem(key)) {
      const nombres = low.map(p=>`${p.nombre} (${p.stock})`).join(', ');
      pushNotif('⚠️ Stock bajo', nombres, 'stock');
      localStorage.setItem(key, '1');
    }
  }
}

// 54. PÁGINA: DASHBOARD
// Muestra métricas de la semana, gráfico por canal,
// top productos más vendidos y últimas ventas
// ============================================================
function getWeek() {
  const now = new Date(), day = now.getDay();
  const mon = new Date(now);
  mon.setDate(now.getDate() - (day===0?6:day-1));
  mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6); sun.setHours(23,59,59,999);
  return { start:mon, end:sun };
}

function renderDashboard() {
  const { start, end } = getWeek();
  const wv = DATA.ventas.filter(v => { const d=new Date(v.fecha); return d>=start&&d<=end; });
  const wg = DATA.gastos.filter(g => { const d=new Date(g.fecha); return d>=start&&d<=end; });
  const tv = wv.reduce((s,v)=>s+Number(v.total||0),0);
  const tg = wg.reduce((s,g)=>s+Number(g.valor||0),0);
  const util = tv - tg;
  const hoyV = DATA.ventas.filter(v => v.fecha === today());
  const totalHoy = hoyV.reduce((s,v)=>s+Number(v.total||0),0);

  // Alerta de stock bajo
  const low = DATA.inventario.filter(p => p.stock <= (p.stockMinimo||5));
  const alertHtml = low.length ? `
    <div class="alert alert-warn">
      <span class="alert-icon">⚠️</span>
      <div><strong>Stock bajo:</strong> ${low.map(p=>`${p.nombre} (${p.stock} uds.)`).join(' · ')}</div>
    </div>` : '';

  // Gráfico de barras por canal
  const canales = { web:0, directo:0, distribuidor:0 };
  wv.forEach(v => { if(canales[v.canal]!==undefined) canales[v.canal]+=Number(v.total||0); });
  const maxC = Math.max(...Object.values(canales), 1);
  const cNames = { web:'Web', directo:'Directo', distribuidor:'Dist.' };
  const cColors = { web:'#BFDBFE', directo:'var(--lime-accent)', distribuidor:'#FDE68A' };
  const barHtml = Object.entries(canales).map(([k,v]) => `
    <div class="bar-col">
      <div class="bar-val">${fmt(v)}</div>
      <div class="bar-rect" style="height:${Math.max(4,(v/maxC)*75)}px;background:${cColors[k]}"></div>
      <div class="bar-lbl">${cNames[k]}</div>
    </div>`).join('');

  // Top productos
  const pm={};
  DATA.ventas.forEach(v=>{
    if(!pm[v.producto]) pm[v.producto]={cant:0,total:0};
    pm[v.producto].cant+=Number(v.cant||0);
    pm[v.producto].total+=Number(v.total||0);
  });
  const top = Object.entries(pm).sort((a,b)=>b[1].cant-a[1].cant).slice(0,5);
  const maxT = top.length ? top[0][1].cant : 1;
  const topHtml = top.length ? top.map(([n,d],i) => `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="width:20px;height:20px;border-radius:50%;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--ink-2);flex-shrink:0">${i+1}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:500;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px">${n}</div>
        <div class="prog"><div class="prog-fill prog-lime" style="width:${Math.round((d.cant/maxT)*100)}%"></div></div>
      </div>
      <span style="font-size:11px;color:var(--ink-3);white-space:nowrap">${d.cant} uds</span>
    </div>`).join('')
    : '<div class="empty-state" style="padding:16px"><div class="empty-state-text">Sin ventas aún</div></div>';

  // Meta del mes actual
  const mesActual = new Date().toISOString().slice(0,7);
  const metaActual = DATA.metas.find(m => m.mes === mesActual);
  const metaHtml = metaActual ? `
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Meta del mes</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;color:var(--ink)">${fmt(tv)} de ${fmt(metaActual.ventasMeta)}</span>
        <span style="font-size:14px;font-weight:700;color:var(--lime)">${Math.min(100,Math.round((tv/metaActual.ventasMeta)*100))}%</span>
      </div>
      <div class="prog"><div class="prog-fill prog-lime" style="width:${Math.min(100,Math.round((tv/metaActual.ventasMeta)*100))}%"></div></div>
    </div>` : '';

  // Tabla de últimas ventas
  const lastV = DATA.ventas.slice(0,8);
  const tblHtml = lastV.length ? `
    <div class="table-wrap">
      <table class="tbl">
        <thead><tr><th>Fecha</th><th>Cliente</th><th>Producto</th><th>Canal</th><th>Total</th></tr></thead>
        <tbody>${lastV.map(v=>`
          <tr>
            <td style="color:var(--ink-3)">${v.fecha||''}</td>
            <td style="font-weight:500">${v.cliente||'—'}</td>
            <td>${v.producto||''}</td>
            <td><span class="badge b-${v.canal||'web'}">${v.canal||''}</span></td>
            <td style="font-weight:600;color:var(--lime)">${fmt(v.total)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : '<div class="empty-state"><div class="empty-state-icon">🛒</div><div class="empty-state-text">Sin ventas registradas</div></div>';

  document.getElementById('page-dashboard').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">Dashboard</div>
        <div class="page-sub">Semana del ${start.toLocaleDateString('es-CO',{day:'numeric',month:'short'})} al ${end.toLocaleDateString('es-CO',{day:'numeric',month:'short'})}</div>
      </div>
    </div>
    ${alertHtml}
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">Ingresos semana</div>
        <div class="metric-value" style="color:var(--lime)">${fmt(tv)}</div>
        <div class="metric-sub">Hoy: ${fmt(totalHoy)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Gastos semana</div>
        <div class="metric-value" style="color:var(--red)">${fmt(tg)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Utilidad</div>
        <div class="metric-value" style="color:${util>=0?'var(--green)':'var(--red)'}">${fmt(util)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Ventas realizadas</div>
        <div class="metric-value">${wv.length}</div>
        <div class="metric-sub">Hoy: ${hoyV.length}</div>
      </div>
    </div>
    ${metaHtml}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px" class="dash-grid">
      <div class="card">
        <div class="card-title">Ventas por canal</div>
        <div class="bar-chart">${barHtml}</div>
      </div>
      <div class="card">
        <div class="card-title">Productos más vendidos</div>
        ${topHtml}
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="card-title" style="margin:0">Últimas ventas</div>
        <button class="btn btn-sm" onclick="showPage('ventas')">Ver todas →</button>
      </div>
      ${tblHtml}
    </div>`;
}

window.seleccionarPrecio = (tipo) => {
  // 74. Reseteamos los estilos de los 3 botones al estado inactivo
  const btns = { publico:'btn-publico', distribuidor:'btn-distribuidor', especial:'btn-especial' };
  Object.values(btns).forEach(id => {
    const btn = document.getElementById(id);
    btn.style.border = '2px solid var(--border)';
    btn.style.background = 'var(--surface-2)';
    btn.querySelector('div:first-child').style.color = 'var(--ink-3)';
    btn.querySelector('div:last-child').style.color = 'var(--ink-2)';
  });

  // 75. Aplicamos el estilo activo al botón seleccionado según el tipo
  const colores = {
    publico: { border:'#2563EB', bg:'#EFF6FF', color:'#1D4ED8' },
    distribuidor: { border:'#D97706', bg:'#FFFBEB', color:'#92400E' },
    especial: { border:'#16A34A', bg:'#F0FDF4', color:'#166534' }
  };
  const c = colores[tipo];
  const btnActivo = document.getElementById(btns[tipo]);
  btnActivo.style.border = `2px solid ${c.border}`;
  btnActivo.style.background = c.bg;
  btnActivo.querySelector('div:first-child').style.color = c.color;
  btnActivo.querySelector('div:last-child').style.color = c.color;

  // 76. Llenamos el campo de precio con el valor correspondiente al tipo seleccionado
  const prod = DATA.inventario.find(p => p.id === document.getElementById('v-prod').value);
  if(!prod) return;
  const precios = { publico: prod.pventa, distribuidor: prod.pdist||0, especial: prod.pesp||0 };
  const precio = precios[tipo];

  // 77. Guardamos el tipo de precio seleccionado en el input oculto para registrarlo en la venta
  document.getElementById('v-precio').value = precio > 0 ? precio : '';
  document.getElementById('v-precio').dataset.tipoPrecio = tipo;
  calcVentaTotal();
};

window.calcVentaTotal = () => {
  const c = Number(document.getElementById('v-cant').value)||0;
  const p = Number(document.getElementById('v-precio').value)||0;
  document.getElementById('v-total').value = c * p;
};

window.guardarVenta = async () => {
  const prodId = document.getElementById('v-prod').value;
  const cant = Number(document.getElementById('v-cant').value);
  const precio = Number(document.getElementById('v-precio').value);
  const fecha = document.getElementById('v-fecha').value;
  if(!fecha||!prodId||!cant||!precio) { alert('Completa los campos requeridos'); return; }
  const prod = DATA.inventario.find(p=>p.id===prodId);
  if(!prod) { alert('Producto no encontrado'); return; }
  if(prod.stock < cant) { alert(`Stock insuficiente. Disponible: ${prod.stock} uds.`); return; }
  const total = Number(document.getElementById('v-total').value);
  const cliente = document.getElementById('v-cliente').value;
  // 78. tipoPrecio registra qué precio se aplicó (publico/distribuidor/especial)
  //     Esto permite analizar después cuánto vendemos a cada tipo de cliente
  const tipoPrecio = document.getElementById('v-precio').dataset.tipoPrecio || 'publico';
  const nuevoStock = prod.stock - cant;
  await updateDoc(doc(db,'inventario',prodId), { stock: nuevoStock });
  await addDoc(collection(db,'ventas'), {
    fecha, canal:document.getElementById('v-canal').value,
    producto:prod.nombre, prodId, cant, precio, total,
    cliente, nota:document.getElementById('v-nota').value,
    tipoPrecio,   // Guardamos el tipo de precio aplicado
    createdAt:serverTimestamp()
  });
  await pushNotif('💰 Nueva venta', `${prod.nombre}${cliente?' — '+cliente:''} · ${fmt(total)}`, 'venta');
  if(nuevoStock <= (prod.stockMinimo||5))
    await pushNotif('⚠️ Stock bajo', `${prod.nombre} quedó con ${nuevoStock} unidades`, 'stock');
  closeModal('modal-venta');
};

window.exportarCSV = () => {
  const header = ['Fecha','Canal','Producto','Cliente','Cantidad','Precio','Total','Nota'];
  const rows = DATA.ventas.map(v => [v.fecha,v.canal,v.producto,v.cliente||'',v.cant,v.precio,v.total,v.nota||'']);
  const csv = [header,...rows].map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `DUPPLA_Ventas_${today()}.csv`;
  a.click();
};

window.guardarProducto = async () => {
  // 84. Validamos campos obligatorios
  const nombre = document.getElementById('p-nombre').value.trim();
  const pventa = Number(document.getElementById('p-pventa').value);
  if(!nombre||!pventa) { alert('Nombre y precio público son requeridos'); return; }

  // 85. Construimos el objeto con todos los datos del formulario
  const datos = {
    nombre,
    marca: document.getElementById('p-marca').value,
    stock: Number(document.getElementById('p-stock').value)||0,
    costo: Number(document.getElementById('p-costo').value)||0,
    pventa,                                                       // Precio público
    pdist: Number(document.getElementById('p-pdist').value)||0,  // Precio distribuidor
    pesp:  Number(document.getElementById('p-pesp').value)||0,   // Precio especial
    stockMinimo: Number(document.getElementById('p-minimo').value)||5,
  };

  // 86. Verificamos si hay un ID guardado en el campo oculto
  //     Si hay ID = estamos editando un producto existente → usamos updateDoc
  //     Si no hay ID = estamos creando uno nuevo → usamos addDoc
  const prodId = document.getElementById('p-id').value;
  if(prodId) {
    // Modo edición: actualizamos el documento existente en Firebase
    await updateDoc(doc(db,'inventario',prodId), datos);
  } else {
    // Modo creación: agregamos un documento nuevo a Firebase
    datos.createdAt = serverTimestamp();
    await addDoc(collection(db,'inventario'), datos);
  }

  closeModal('modal-producto');
  // 87. Limpiamos el formulario y reseteamos a modo creación
  document.getElementById('p-id').value = '';
  document.getElementById('p-nombre').value = '';
  document.getElementById('p-stock').value = '0';
  document.getElementById('p-costo').value = '0';
  document.getElementById('p-pventa').value = '0';
  document.getElementById('p-pdist').value = '0';
  document.getElementById('p-pesp').value = '0';
  document.getElementById('modal-producto-title').textContent = 'Agregar producto';
  document.getElementById('btn-guardar-producto').textContent = 'Guardar producto';
};

window.editarProducto = (id) => {
  // 88. Buscamos el producto en DATA.inventario por su ID
  const prod = DATA.inventario.find(p => p.id === id);
  if(!prod) return;

  // 89. Cargamos todos los datos del producto en el formulario
  //     Esto convierte el modal de "agregar" en "editar" sin necesitar otro modal
  document.getElementById('p-id').value = id;           // Guardamos el ID para el guardado
  document.getElementById('p-nombre').value = prod.nombre;
  document.getElementById('p-stock').value = prod.stock;
  document.getElementById('p-costo').value = prod.costo || 0;
  document.getElementById('p-pventa').value = prod.pventa || 0;
  document.getElementById('p-pdist').value = prod.pdist || 0;
  document.getElementById('p-pesp').value = prod.pesp || 0;
  document.getElementById('p-minimo').value = prod.stockMinimo || 5;

  // 90. Seleccionamos la marca correcta en el select
  const marcaSelect = document.getElementById('p-marca');
  for(let i = 0; i < marcaSelect.options.length; i++) {
    if(marcaSelect.options[i].value === prod.marca) {
      marcaSelect.selectedIndex = i;
      break;
    }
  }

  // 91. Cambiamos el título y el botón para indicar que estamos en modo edición
  document.getElementById('modal-producto-title').textContent = `Editar — ${prod.nombre}`;
  document.getElementById('btn-guardar-producto').textContent = 'Guardar cambios';

  // 92. Abrimos el modal ya cargado con los datos
  openModal('modal-producto');
};

window.abrirAjuste = (id, nombre, stock) => {
  ajusteProductoId = id;
  document.getElementById('ajuste-title').textContent = `Ajustar stock — ${nombre} (actual: ${stock})`;

window.aplicarAjuste = async () => {
  const delta = Number(document.getElementById('aj-delta').value);
  if(!delta) { alert('Ingresa un número distinto de 0'); return; }
  const prod = DATA.inventario.find(p=>p.id===ajusteProductoId);
  if(!prod) return;
  await updateDoc(doc(db,'inventario',ajusteProductoId), { stock:Math.max(0, prod.stock+delta) });
  closeModal('modal-ajuste');
};

// Se construye automáticamente desde el historial de ventas
// Muestra compras totales, producto favorito, última compra
// ============================================================
function renderClientes() {
  const cm = {};
  DATA.ventas.forEach(v => {
    if(!v.cliente) return;
    if(!cm[v.cliente]) cm[v.cliente] = { nombre:v.cliente, compras:0, total:0, ultima:'', fav:{} };
    cm[v.cliente].compras++;
    cm[v.cliente].total += Number(v.total||0);
    if(!cm[v.cliente].ultima || v.fecha > cm[v.cliente].ultima) cm[v.cliente].ultima = v.fecha;
    cm[v.cliente].fav[v.producto] = (cm[v.cliente].fav[v.producto]||0)+1;
  });
  const clientes = Object.values(cm).sort((a,b)=>b.total-a.total);

  const rows = clientes.map(c => {
    const initials = c.nombre.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const fav = Object.entries(c.fav).sort((a,b)=>b[1]-a[1])[0];
    return `<tr>
      <td>
        <div style="display:flex;align-items:center;gap:9px">
          <div class="avatar">${initials}</div>
          <span style="font-weight:500">${c.nombre}</span>
        </div>
      </td>
      <td>${c.compras}</td>
      <td style="font-weight:600;color:var(--lime)">${fmt(c.total)}</td>
      <td style="color:var(--ink-3)">${fav?fav[0].split(' ').slice(0,3).join(' '):'—'}</td>
      <td style="color:var(--ink-3)">${c.ultima}</td>
    </tr>`;
  }).join('');

  document.getElementById('page-clientes').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Clientes</div><div class="page-sub">${clientes.length} clientes registrados</div></div>
    </div>
    <div class="card">
      ${clientes.length ?
        `<div class="table-wrap"><table class="tbl">
          <thead><tr><th>Cliente</th><th>Compras</th><th>Total gastado</th><th>Producto favorito</th><th>Última compra</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div>`
        : `<div class="empty-state"><div class="empty-state-icon">👥</div><div class="empty-state-text">Sin clientes aún</div><div class="empty-state-sub">Los clientes aparecen automáticamente cuando registras ventas con nombre</div></div>`}
    </div>`;
}

  const total = Number(document.getElementById('pe-total').value)||0;
  await addDoc(collection(db,'pedidos'), {
    proveedorId:opt.value, proveedorNombre:opt.dataset.nombre||opt.text,
    fecha:document.getElementById('pe-fecha').value,
    prods:document.getElementById('pe-prods').value,
    total, flete:Number(document.getElementById('pe-flete').value)||0,
    notas:document.getElementById('pe-notas').value,
    estado:'pendiente', createdAt:serverTimestamp()
  });
  await pushNotif('📋 Nuevo pedido', `${opt.dataset.nombre} · ${fmt(total)}`, 'pedido');
  closeModal('modal-pedido');
};

window.cambiarEstadoPedido = async (id, estado) => {
  await updateDoc(doc(db,'pedidos',id), { estado });
  const p = DATA.pedidos.find(x=>x.id===id);
  if(p) await pushNotif('📋 Pedido actualizado', `${p.proveedorNombre} → ${EST[estado]?.l||estado}`, 'pedido');
};

// ============================================================
// 61. PÁGINA: METAS
// Seguimiento de objetivos mensuales con barras de progreso
// ============================================================
const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function renderMetas() {
  const cards = DATA.metas.map(m => {
    const [anio,mes] = (m.mes||'').split('-');
    const tv = DATA.ventas.filter(v=>v.fecha?.slice(0,7)===m.mes).reduce((s,v)=>s+Number(v.total||0),0);
    const tg = DATA.gastos.filter(g=>g.fecha?.slice(0,7)===m.mes).reduce((s,g)=>s+Number(g.valor||0),0);
    const pv = m.ventasMeta>0 ? Math.min(100,Math.round((tv/m.ventasMeta)*100)) : 0;
    const pg = m.gastoMax>0 ? Math.min(100,Math.round((tg/m.gastoMax)*100)) : 0;
    return `<div class="list-card">
      <div class="list-card-header">
        <div>
          <div class="list-card-title">${MESES[parseInt(mes)]||m.mes} ${anio}</div>
          ${m.notas?`<div class="list-card-sub">${m.notas}</div>`:''}
        </div>
        <button class="btn btn-sm btn-danger" onclick="eliminarDoc('metas','${m.id}')">✕</button>
      </div>
      <div class="list-card-body">
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <span style="font-size:12px;color:var(--ink-2)">Ventas: ${fmt(tv)} / ${fmt(m.ventasMeta)}</span>
            <span style="font-size:12px;font-weight:600;color:${pv>=100?'var(--green)':pv>=70?'var(--amber)':'var(--blue)'}">${pv}%</span>
          </div>
          <div class="prog"><div class="prog-fill ${pv>=100?'prog-lime':pv>=70?'prog-amber':'prog-blue'}" style="width:${pv}%"></div></div>
        </div>
        ${m.gastoMax>0?`
          <div style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;margin-bottom:5px">
              <span style="font-size:12px;color:var(--ink-2)">Gastos: ${fmt(tg)} / ${fmt(m.gastoMax)}</span>
              <span style="font-size:12px;font-weight:600;color:${pg>=90?'var(--red)':pg>=70?'var(--amber)':'var(--green)'}">${pg}%</span>
            </div>
            <div class="prog"><div class="prog-fill ${pg>=90?'prog-red':pg>=70?'prog-amber':'prog-lime'}" style="width:${pg}%"></div></div>
          </div>`:''}
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
          ${[['Ingresos',fmt(tv),'var(--lime)'],['Gastos',fmt(tg),'var(--red)'],['Utilidad',fmt(tv-tg),tv-tg>=0?'var(--green)':'var(--red)']].map(([l,v,c])=>`
            <div style="background:var(--surface-2);border-radius:8px;padding:10px;text-align:center">
              <div style="font-size:10px;color:var(--ink-3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em">${l}</div>
              <div style="font-size:13px;font-weight:700;color:${c}">${v}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('page-metas').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Metas y presupuesto</div></div>
      <button class="btn btn-lime btn-sm" onclick="openModal('modal-meta')">+ Nueva meta</button>
    </div>
    ${DATA.metas.length ?
      `<div class="list-cards">${cards}</div>`
      : `<div class="card"><div class="empty-state"><div class="empty-state-icon">🎯</div><div class="empty-state-text">Sin metas configuradas</div><div class="empty-state-sub">Crea tu primera meta mensual</div></div></div>`}`;
}

window.guardarMeta = async () => {
  const mes = document.getElementById('me-mes').value;
  const ventasMeta = Number(document.getElementById('me-ventas').value);
  if(!mes||!ventasMeta) { alert('Mes y meta de ventas son requeridos'); return; }
  await addDoc(collection(db,'metas'), {
    mes, ventasMeta,
    gastoMax:Number(document.getElementById('me-gastos').value)||0,
    notas:document.getElementById('me-notas').value,
    createdAt:serverTimestamp()
  });
  closeModal('modal-meta');
};

// ============================================================
// 62. ELIMINAR DOCUMENTO
// Función genérica para eliminar cualquier registro de Firebase
// col = nombre de la colección, id = ID del documento
// ============================================================
window.eliminarDoc = async (col, id) => {
  if(!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.')) return;
  await deleteDoc(doc(db, col, id));
};

</script>
